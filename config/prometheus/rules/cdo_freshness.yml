groups:
  - name: cdo_data_freshness
    rules:
      - alert: WeatherDataStale
        expr: (time() - cdo_weather_last_update) > 3600
        for: 5m
        labels:
          severity: warning
          domain: weather
        annotations:
          summary: "Weather data is stale"
          description: "Weather data has not been updated for more than 1 hour. Last update was {{ $value | humanizeDuration }} ago."

      - alert: EconomicDataStale
        expr: (time() - cdo_economy_last_update) > 2592000
        for: 5m
        labels:
          severity: warning
          domain: economy
        annotations:
          summary: "Economic data is stale"
          description: "Economic data has not been updated for more than 30 days. Last update was {{ $value | humanizeDuration }} ago."

      - alert: ExporterDown
        expr: up{job="cdo-exporter"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CDO Exporter is down"
          description: "The CDO exporter service has been unreachable for more than 5 minutes."
