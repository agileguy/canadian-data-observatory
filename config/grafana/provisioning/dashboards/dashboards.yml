apiVersion: 1

providers:
  - name: CDO Dashboards
    orgId: 1
    folder: Canadian Data Observatory
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/files
      foldersFromFilesStructure: false
